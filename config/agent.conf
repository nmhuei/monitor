# Agent runtime configuration

# ── Security ──────────────────────────────────────────────────────────────────
# Must match AUTH_TOKEN in server.conf (or leave empty if server has no token)
#AUTH_TOKEN=changeme_set_a_strong_secret_here

# ── Reconnect policy ─────────────────────────────────────────────────────────
# 0 = retry forever
MAX_CONNECT_RETRIES=12

# Delay between reconnect attempts (seconds)
RECONNECT_INTERVAL_SEC=5
