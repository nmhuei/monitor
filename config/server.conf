# monitor_server runtime configuration

# ── Security ─────────────────────────────────────────────────────────────────
# Pre-shared secret. Agents must send the same token or they are rejected.
# Leave empty (or comment out) to allow any agent to connect (LAN-only setup).
#AUTH_TOKEN=changeme_set_a_strong_secret_here

# ── Connection limits ─────────────────────────────────────────────────────────
# Max concurrent agent connections allowed from a single source IP
MAX_AGENTS_PER_IP=2

# ── Persistence ───────────────────────────────────────────────────────────────
# Auto-backup interval for in-memory state (seconds)
BACKUP_INTERVAL_SEC=10

# State file path (relative to server working directory)
# Path traversal (../) is rejected automatically.
STATE_FILE=data/monitor_state.db
