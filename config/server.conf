# monitor_server runtime configuration

# ── Security ──────────────────────────────────────────────────────────────────
# Pre-shared secret. Agents must send the same token or they are rejected.
# Leave empty (or comment out) to allow any agent to connect (LAN-only setup).
#AUTH_TOKEN=changeme_set_a_strong_secret_here

# ── Connection limits ─────────────────────────────────────────────────────────
# Max concurrent agent connections allowed from a single source IP
MAX_AGENTS_PER_IP=2

# ── Persistence ───────────────────────────────────────────────────────────────
BACKUP_INTERVAL_SEC=10
STATE_FILE=data/monitor_state.db

# ── Stale/Offline policy ──────────────────────────────────────────────────────
STALE_SEC=30
OFFLINE_SEC=90

# ── Alerting (webhook) ────────────────────────────────────────────────────────
# POST JSON to this URL on ALERT / OFFLINE / STALE transitions and recovery.
# Works with Slack, Discord (use /slack endpoint), Teams, or any HTTP listener.
# Leave empty to disable.
#ALERT_WEBHOOK_URL=https://hooks.slack.com/services/XXX/YYY/ZZZ
#ALERT_WEBHOOK_URL=http://localhost:9999/alert

# Min seconds between alerts for the same host (prevents spam)
ALERT_COOLDOWN_SEC=300

# ── Logging ───────────────────────────────────────────────────────────────────
# Log file path (auto-rotated at 10 MB → .1)
LOG_FILE=data/monitor.log
# Log level: DEBUG / INFO / WARN / ERROR
LOG_LEVEL=INFO

# ── History persistence (JSONL per host) ──────────────────────────────────────
# Each host gets a file: <HISTORY_DIR>/<host>.jsonl
HISTORY_DIR=data/history
# Max lines per file before rotation (older lines trimmed)
HISTORY_MAX_LINES=10000

# HTTP API + Prometheus metrics endpoint (0 = disabled)
HTTP_API_PORT=8786
