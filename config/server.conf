# monitor_server runtime behavior
# Max concurrent agent connections allowed from a single source IP.
MAX_AGENTS_PER_IP=2

# Auto-backup interval for in-memory monitor state (seconds)
BACKUP_INTERVAL_SEC=10

# Agent send interval used by demo scripts (seconds)
AGENT_INTERVAL_SEC=2

# File used to persist/restore state across restart/shutdown
STATE_FILE=data/monitor_state.db

# Shared auth token (agent must send same token). Empty => auth disabled.
AUTH_TOKEN=

# Socket receive timeout to prevent stuck half-open client threads
SOCKET_RECV_TIMEOUT_SEC=10
